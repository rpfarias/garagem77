# Configurações do Servidor
server.port=8080
server.servlet.context-path=/api
spring.application.name=garagem77-api

# Datasource - Profile Specific
# See application-dev.properties and application-prod.properties

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

# Logging
logging.level.root=INFO
logging.level.com.garagem77=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Jackson (JSON)
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=America/Sao_Paulo

# JWT
app.jwt.secret=seu_secret_key_aqui_256_bits_ou_mais_caracteres_para_producao
app.jwt.expiration=86400000

# Multi-Tenancy
app.tenancy.mode=SCHEMA_PER_TENANT
app.tenancy.default-schema=public

# Modo desenvolvimento
spring.profiles.active=dev
